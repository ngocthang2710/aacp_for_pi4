[versions]
agp            = "8.5.2"
kotlin         = "2.0.0"
compileSdk     = "35"
minSdk         = "29"
targetSdk      = "35"
ndk            = "27.0.12077973"
cmake          = "3.22.1"
coreKtx        = "1.13.1"
appcompat      = "1.7.0"
annotation     = "1.8.0"

[libraries]
